<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    /*
  container เป็นกล่องใบที่สองของเรา
  ที่จะวางตัวจากบนลงล่าง
*/
.container {
  display: flex;
  /* อีลีเมนต์ต่างๆในกล่องนี้จะมีทิศทางเดียว คือจากบนลงล่าง */
  flex-direction: column;
  color: #fff;
  font-weight: bold;
  text-align: center;
}

.header,
.sidebar,
.main,
.footer {
  padding: 10px;
}

.container {
  display: flex;
  /* อีลีเมนต์ของเรามีการวางตัวจากซ้ายไปขวา */
  flex-flow: row wrap;
  color: #fff;
  font-weight: bold;
  text-align: center;
}
.container >* {
    padding: 10px;
}

.header {
  background: #8cc152;
  flex: 3;
}

.main {
  background: #f6bb42;
  flex: 3;
}

.sidebar {
  background: #e9573f;
  flex: 3;
}
.footer {
  background: #d770ad;
  flex: 1  100%;
}

    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            Header
        </header>
        <aside class="sidebar">
            Sidebar
        </aside>
        <section class="main">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Ut vitae facilisis
            quam, nec consectetur urna. Aliquam elementum nibh metus, eget lobortis
            lacus aliquet eu.
        </section>
        <footer class="footer">
            Footer
        </footer>
    </div>
       
    
</body>
</html>
